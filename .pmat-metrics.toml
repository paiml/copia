# PMAT Quality Metrics Configuration for Copia
#
# Copia is an I/O-intensive rsync-style delta sync library.
# I/O functions (Read/Write/Seek) cannot score high on Purity,
# which inherently limits the provability average for systems libraries.

[thresholds]
# Provability: I/O-heavy sync library has ~50% ceiling due to Purity domain.
# Functions using Read/Write/Seek score 0.0 on purity (4th domain).
# Best achievable: (1.0 + 0.75 + 0.75 + 0.0) / 4 = 0.625 avg for I/O fns.
provability_min = 0.49

[entropy]
# Project-wide diversity is 0% because all code serves a single domain
# (rsync delta sync). The violation reports "saves 0 lines" — no
# actionable refactoring exists. Set to 0.0 to suppress false positive.
min_pattern_diversity = 0.0

[quality_gates]
min_coverage_pct = 95.0
min_mutation_score_pct = 80.0
max_cyclomatic_complexity = 15
max_cognitive_complexity = 20
min_tdg_grade = "A"
max_unwrap_calls = 0
max_satd_comments = 0
max_dead_code_pct = 5.0

[enforcement]
fail_on_threshold_violation = true
fail_on_regression = true
